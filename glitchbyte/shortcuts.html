<!DOCTYPE html>
<html>
<head>
    <title>Glitchbyte</title>

    <link rel="stylesheet" href="style.css">

<body>

    <header>
        <h1>Shortcuts</h1>
        <p>This exists so i can use it as a new tab</p>
    </header>

    <main>
        <div class="card">
            <h2>Youtube</h2>
            <a href="www.youtube.com"><button>Open Youtube</button></a>
            <a href="https://www.youtube.com/@ConsoleByte"><button>My Channel</button></a>
            <a href="https://www.youtube.com/playlist?list=WL"><button>Watch Later</button></a>
        </div>
        <div class="card">
            <h2>General</h2>
            <a href="www.google.com"><button>Google</button></a>
            <a href="duckduckgo.com"><button>DuckDuckGo</button></a>
            <a href="discord.com"><button>Web Discord</button></a>
        </div>
        <div class="card">
            <h2>Games</h2>
            <a href="minecraft.net"><button>Minecraft</button></a>
            <a href="steampowered.com"><button>Steam</button></a>
        </div>
    </main>

    <footer>
        <p>I made this - Consolebyte</p>
        <a href="https://github.com/RealConsoleByte/Glitchbyte">Source code can be found on my GitHub :p</a>
